name: Deploy Backend
run-name: Deploy Backend - ${{ github.actor }}

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yaml'
  workflow_dispatch:

concurrency:
  group: deploy-backend-${{ github.actor }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  STACK_NAME: agentcore-chatbot-backend
  NODE_VERSION: '24'

permissions:
  id-token: write
  contents: read

jobs:
  prepare-deployment:
    name: Prepare Deployment
    runs-on: ubuntu-latest
    outputs:
      env_descriptor: ${{ steps.prepare-parameters.outputs.env_descriptor }}
      env_hash: ${{ steps.prepare-parameters.outputs.env_hash }}
      env_name: ${{ steps.prepare-parameters.outputs.env_name }}
      backend_stack_name: ${{ steps.prepare-parameters.outputs.backend_stack_name }}
    steps:
      - name: Prepare parameters
        id: prepare-parameters
        run: |
          ENV_DESCRIPTOR="${{ github.actor }}"
          ENV_HASH=$(echo -n "$ENV_DESCRIPTOR" | sha1sum | cut -c1-6)
          ENV_NAME="${{ github.actor }}"
          BACKEND_STACK_NAME="${{ env.STACK_NAME }}-$ENV_DESCRIPTOR"

          echo "env_descriptor=$ENV_DESCRIPTOR" >> $GITHUB_OUTPUT
          echo "env_hash=$ENV_HASH" >> $GITHUB_OUTPUT
          echo "env_name=$ENV_NAME" >> $GITHUB_OUTPUT
          echo "backend_stack_name=$BACKEND_STACK_NAME" >> $GITHUB_OUTPUT

          cat >> $GITHUB_STEP_SUMMARY << EOF
          # Preview Deployment
          * Environment Descriptor: \`$ENV_DESCRIPTOR\`
          * Environment Hash: \`$ENV_HASH\`
          * Backend Stack: \`$BACKEND_STACK_NAME\`
          EOF

  package-agent:
    name: Package & Upload Agent
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      s3-key: ${{ steps.package.outputs.s3-key }}
      package-size: ${{ steps.package.outputs.package-size }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: us-east-1
          role-to-assume: ${{ secrets.PIPELINE_EXECUTION_ROLE }}

      - name: Package Agent
        id: package
        uses: ./.github/actions/package-agent
        with:
          agent-name: "agent"
          agent-path: "backend/agents/agent"
          artifacts-bucket: ${{ secrets.ARTIFACTS_BUCKET_NAME }}
          python-version: '3.13'
          architecture: 'aarch64-manylinux2014'

  collect-agent-artifacts:
    name: Collect Agent Artifacts & Generate Parameters
    runs-on: ubuntu-latest
    needs: [package-agent]
    outputs:
      agent-key: ${{ steps.collect.outputs.agent-key }}
    steps:
      - name: Collect agent artifacts and generate parameters
        id: collect
        run: |
          echo "## Agent Artifacts Collection" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          AGENT_KEY="${{ needs.package-agent.outputs.s3-key }}"
          AGENT_SIZE="${{ needs.package-agent.outputs.package-size }}"

          if [ -z "$AGENT_KEY" ]; then
            echo "Agent S3 key is missing" >> $GITHUB_STEP_SUMMARY
            echo "::error::Agent packaging failed - S3 key is missing"
            exit 1
          fi

          echo "Agent: \`$AGENT_KEY\` ($AGENT_SIZE)" >> $GITHUB_STEP_SUMMARY
          echo "agent-key=$AGENT_KEY" >> $GITHUB_OUTPUT

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Agent artifacts validated. Proceeding with deployment..." >> $GITHUB_STEP_SUMMARY

  deploy-backend:
    runs-on: ubuntu-latest
    needs: [collect-agent-artifacts, prepare-deployment]
    outputs:
      api-url: ${{ steps.deploy.outputs.api-url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.PIPELINE_EXECUTION_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Generate samconfig.yaml from template
        working-directory: backend
        env:
          STACK_NAME: ${{ needs.prepare-deployment.outputs.backend_stack_name }}
          ENV_HASH: ${{ needs.prepare-deployment.outputs.env_hash }}
          ENV_NAME: ${{ needs.prepare-deployment.outputs.env_name }}
          ARTIFACTS_BUCKET_NAME: ${{ secrets.ARTIFACTS_BUCKET_NAME }}
          AGENT_DIRECT_DEPLOY_KEY: ${{ needs.collect-agent-artifacts.outputs.agent-key }}
          AWS_REGION: ${{ env.AWS_REGION }}

        run: |
          envsubst < samconfig.yaml.template > samconfig.yaml
          echo "Generated samconfig.yaml:"
          cat samconfig.yaml

      - name: Build and deploy backend infrastructure
        id: deploy
        working-directory: backend
        run: |
          npm ci
          npm install -g esbuild

          sam build

          sam deploy \
            --s3-bucket "${{ secrets.ARTIFACTS_BUCKET_NAME }}" \
            --role-arn "${{ secrets.CLOUDFORMATION_EXECUTION_ROLE }}" \
            --no-fail-on-empty-changeset

          # Get stack outputs
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name "${{ needs.prepare-deployment.outputs.backend_stack_name }}" \
            --query 'Stacks[0].Outputs[?OutputKey==`BackendApiUrl`].OutputValue' \
            --output text)

          echo "api-url=$API_URL" >> $GITHUB_OUTPUT

          # Add to GitHub Summary
          echo "## 🚀 Backend API Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**🌐 API URL:** [$API_URL]($API_URL)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployed Agent" >> $GITHUB_STEP_SUMMARY
          echo "- **Agent (S3)**: \`${{ needs.collect-agent-artifacts.outputs.agent-key }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "Backend infrastructure deployed successfully:"
          echo "API URL: $API_URL"
          echo "Agent deployed: ${{ needs.collect-agent-artifacts.outputs.agent-key }}"