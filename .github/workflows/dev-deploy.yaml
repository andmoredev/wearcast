name: Deploy Dev Environment
run-name: Deploy Dev Environment - Auto Deploy

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/dev-deploy.yaml'
  workflow_dispatch:

concurrency:
  group: deploy-dev-environment
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  BACKEND_STACK_NAME: agentcore-chatbot-backend
  FRONTEND_STACK_NAME: agentcore-chatbot-frontend
  NODE_VERSION: '24'
  ENV_DESCRIPTOR: dev

permissions:
  id-token: write
  contents: read

jobs:
  prepare-deployment:
    name: Prepare Dev Environment
    runs-on: ubuntu-latest
    outputs:
      env_descriptor: ${{ steps.prepare-parameters.outputs.env_descriptor }}
      env_hash: ${{ steps.prepare-parameters.outputs.env_hash }}
      env_name: ${{ steps.prepare-parameters.outputs.env_name }}
      backend_stack_name: ${{ steps.prepare-parameters.outputs.backend_stack_name }}
      frontend_stack_name: ${{ steps.prepare-parameters.outputs.frontend_stack_name }}
    steps:
      - name: Prepare parameters
        id: prepare-parameters
        run: |
          ENV_DESCRIPTOR="dev"
          ENV_HASH=$(echo -n "$ENV_DESCRIPTOR" | sha1sum | cut -c1-6)
          ENV_NAME="dev"
          BACKEND_STACK_NAME="${{ env.BACKEND_STACK_NAME }}-$ENV_DESCRIPTOR"
          FRONTEND_STACK_NAME="${{ env.FRONTEND_STACK_NAME }}-$ENV_DESCRIPTOR"

          echo "env_descriptor=$ENV_DESCRIPTOR" >> $GITHUB_OUTPUT
          echo "env_hash=$ENV_HASH" >> $GITHUB_OUTPUT
          echo "env_name=$ENV_NAME" >> $GITHUB_OUTPUT
          echo "backend_stack_name=$BACKEND_STACK_NAME" >> $GITHUB_OUTPUT
          echo "frontend_stack_name=$FRONTEND_STACK_NAME" >> $GITHUB_OUTPUT

          cat >> $GITHUB_STEP_SUMMARY << EOF
          # Dev Environment Deployment
          * Environment: \`dev\` (hardcoded)
          * Environment Hash: \`$ENV_HASH\`
          * Backend Stack: \`$BACKEND_STACK_NAME\`
          * Frontend Stack: \`$FRONTEND_STACK_NAME\`
          * Trigger: Automatic deployment on main branch merge
          EOF

  package-agent:
    name: Package & Upload Agent
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      s3-key: ${{ steps.package.outputs.s3-key }}
      package-size: ${{ steps.package.outputs.package-size }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: us-east-1
          role-to-assume: ${{ secrets.PIPELINE_EXECUTION_ROLE }}

      - name: Package Agent
        id: package
        uses: ./.github/actions/package-agent
        with:
          agent-name: "agent"
          agent-path: "backend/agents/agent"
          artifacts-bucket: ${{ secrets.ARTIFACTS_BUCKET_NAME }}
          python-version: '3.13'
          architecture: 'aarch64-manylinux2014'

  collect-agent-artifacts:
    name: Collect Agent Artifacts & Generate Parameters
    runs-on: ubuntu-latest
    needs: [package-agent]
    outputs:
      agent-key: ${{ steps.collect.outputs.agent-key }}
    steps:
      - name: Collect agent artifacts and generate parameters
        id: collect
        run: |
          echo "## Agent Artifacts Collection (Dev Environment)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          AGENT_KEY="${{ needs.package-agent.outputs.s3-key }}"
          AGENT_SIZE="${{ needs.package-agent.outputs.package-size }}"

          if [ -z "$AGENT_KEY" ]; then
            echo "Agent S3 key is missing" >> $GITHUB_STEP_SUMMARY
            echo "::error::Agent packaging failed - S3 key is missing"
            exit 1
          fi

          echo "Agent: \`$AGENT_KEY\` ($AGENT_SIZE)" >> $GITHUB_STEP_SUMMARY
          echo "agent-key=$AGENT_KEY" >> $GITHUB_OUTPUT

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Agent artifacts validated. Proceeding with dev deployment..." >> $GITHUB_STEP_SUMMARY

  deploy-backend:
    runs-on: ubuntu-latest
    needs: [collect-agent-artifacts, prepare-deployment]
    outputs:
      api-url: ${{ steps.deploy.outputs.api-url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.PIPELINE_EXECUTION_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Generate samconfig.yaml from template
        working-directory: backend
        env:
          STACK_NAME: ${{ needs.prepare-deployment.outputs.backend_stack_name }}
          ENV_HASH: ${{ needs.prepare-deployment.outputs.env_hash }}
          ENV_NAME: ${{ needs.prepare-deployment.outputs.env_name }}
          ARTIFACTS_BUCKET_NAME: ${{ secrets.ARTIFACTS_BUCKET_NAME }}
          AGENT_DIRECT_DEPLOY_KEY: ${{ needs.collect-agent-artifacts.outputs.agent-key }}
          AWS_REGION: ${{ env.AWS_REGION }}

        run: |
          envsubst < samconfig.yaml.template > samconfig.yaml
          echo "Generated samconfig.yaml for dev environment:"
          cat samconfig.yaml

      - name: Build and deploy backend infrastructure
        id: deploy
        working-directory: backend
        run: |
          npm ci
          npm install -g esbuild

          sam build

          sam deploy \
            --s3-bucket "${{ secrets.ARTIFACTS_BUCKET_NAME }}" \
            --role-arn "${{ secrets.CLOUDFORMATION_EXECUTION_ROLE }}" \
            --no-fail-on-empty-changeset

          # Get stack outputs
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name "${{ needs.prepare-deployment.outputs.backend_stack_name }}" \
            --query 'Stacks[0].Outputs[?OutputKey==`BackendApiUrl`].OutputValue' \
            --output text)

          echo "api-url=$API_URL" >> $GITHUB_OUTPUT

          # Add to GitHub Summary
          echo "## 🚀 Dev Backend API Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**🌐 API URL:** [$API_URL]($API_URL)" >> $GITHUB_STEP_SUMMARY
          echo "**🏷️ Environment:** dev (hardcoded)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployed Agent" >> $GITHUB_STEP_SUMMARY
          echo "- **Agent (S3)**: \`${{ needs.collect-agent-artifacts.outputs.agent-key }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "Dev backend infrastructure deployed successfully:"
          echo "API URL: $API_URL"
          echo "Agent deployed: ${{ needs.collect-agent-artifacts.outputs.agent-key }}"

  deploy-frontend-infrastructure:
    needs: prepare-deployment
    runs-on: ubuntu-latest
    outputs:
      bucket-name: ${{ steps.deploy.outputs.bucket-name }}
      distribution-id: ${{ steps.deploy.outputs.distribution-id }}
      cloudfront-url: ${{ steps.deploy.outputs.cloudfront-url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.PIPELINE_EXECUTION_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Generate samconfig.yaml from template
        working-directory: frontend
        env:
          STACK_NAME: ${{ needs.prepare-deployment.outputs.frontend_stack_name }}
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          envsubst < samconfig.yaml.template > samconfig.yaml
          echo "Generated samconfig.yaml for dev frontend:"
          cat samconfig.yaml

      - name: Deploy infrastructure
        id: deploy
        working-directory: frontend
        env:
          STACK_NAME: ${{ needs.prepare-deployment.outputs.frontend_stack_name }}
        run: |
          sam build

          sam deploy \
            --s3-bucket "${{ secrets.ARTIFACTS_BUCKET_NAME }}" \
            --role-arn "${{ secrets.CLOUDFORMATION_EXECUTION_ROLE }}" \
            --no-fail-on-empty-changeset

          # Get stack outputs
          BUCKET_NAME=$(aws cloudformation describe-stacks \
            --stack-name "${{ env.STACK_NAME }}" \
            --query 'Stacks[0].Outputs[?OutputKey==`BucketName`].OutputValue' \
            --output text)

          DISTRIBUTION_ID=$(aws cloudformation describe-stacks \
            --stack-name "${{ env.STACK_NAME }}" \
            --query 'Stacks[0].Outputs[?OutputKey==`DistributionId`].OutputValue' \
            --output text)

          CLOUDFRONT_URL=$(aws cloudformation describe-stacks \
            --stack-name "${{ env.STACK_NAME }}" \
            --query 'Stacks[0].Outputs[?OutputKey==`CloudFrontUrl`].OutputValue' \
            --output text)

          echo "bucket-name=$BUCKET_NAME" >> $GITHUB_OUTPUT
          echo "distribution-id=$DISTRIBUTION_ID" >> $GITHUB_OUTPUT
          echo "cloudfront-url=$CLOUDFRONT_URL" >> $GITHUB_OUTPUT

          # Add to GitHub Summary
          echo "## 🏗️ Dev Frontend Infrastructure Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | \`dev\` (hardcoded) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Stack Name** | \`${{ env.STACK_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **S3 Bucket** | \`$BUCKET_NAME\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **CloudFront Distribution** | \`$DISTRIBUTION_ID\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **CloudFront URL** | [$CLOUDFRONT_URL]($CLOUDFRONT_URL) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

  build-and-deploy-frontend:
    runs-on: ubuntu-latest
    needs: [deploy-frontend-infrastructure, deploy-backend, prepare-deployment]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Configure AWS for API config fetch
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.PIPELINE_EXECUTION_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build React application with API configuration
        working-directory: frontend
        env:
          BACKEND_STACK_NAME: ${{ needs.prepare-deployment.outputs.backend_stack_name }}
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          echo "🔍 Building dev frontend with configuration from backend stack..."
          echo "   Backend Stack: $BACKEND_STACK_NAME"
          echo "   Region: $AWS_REGION"
          echo "   Environment: dev (hardcoded)"
          echo ""
          echo "Configuration will be automatically fetched from CloudFormation stack outputs:"
          echo "   - Backend API URL"
          echo ""

          npm run build:with-api

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.PIPELINE_EXECUTION_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload to S3 with cache headers
        working-directory: frontend
        run: |
          BUCKET_NAME="${{ needs.deploy-frontend-infrastructure.outputs.bucket-name }}"

          aws s3 sync dist s3://$BUCKET_NAME \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html" \
            --exclude "*.txt"

          aws s3 cp dist/index.html s3://$BUCKET_NAME/index.html \
            --cache-control "public,max-age=0,must-revalidate"

          echo "Files uploaded to S3 bucket: $BUCKET_NAME"

          # Add build info to GitHub Summary
          echo "## 📦 Dev Application Build & Upload Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ React application built with API configuration" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Backend API URL automatically configured from stack outputs" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Static assets uploaded to S3: \`$BUCKET_NAME\`" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Cache headers configured for optimal performance" >> $GITHUB_STEP_SUMMARY
          echo "- 🏷️ Environment: dev (hardcoded)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Invalidate CloudFront cache
        run: |
          DISTRIBUTION_ID="${{ needs.deploy-frontend-infrastructure.outputs.distribution-id }}"

          aws cloudfront create-invalidation \
            --distribution-id $DISTRIBUTION_ID \
            --paths "/*"

          echo "CloudFront cache invalidation created for distribution: $DISTRIBUTION_ID"

          # Add invalidation info to GitHub Summary
          echo "## 🔄 CloudFront Cache Invalidation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Cache invalidation initiated for distribution: \`$DISTRIBUTION_ID\`" >> $GITHUB_STEP_SUMMARY
          echo "- ⏳ Changes will be available globally within 5-10 minutes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Output deployment URL
        run: |
          CLOUDFRONT_URL="${{ needs.deploy-frontend-infrastructure.outputs.cloudfront-url }}"
          BACKEND_API_URL="${{ needs.deploy-backend.outputs.api-url }}"
          BUCKET_NAME="${{ needs.deploy-frontend-infrastructure.outputs.bucket-name }}"
          DISTRIBUTION_ID="${{ needs.deploy-frontend-infrastructure.outputs.distribution-id }}"

          echo "🚀 Dev environment deployed successfully!"
          echo "📱 Frontend URL: $CLOUDFRONT_URL"
          echo "🔗 Backend API: $BACKEND_API_URL"
          echo "::notice title=Dev Deployment Complete::Dev environment is available at $CLOUDFRONT_URL"

          # Add final deployment summary to GitHub Summary
          echo "## 🚀 Dev Environment Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🎉 Dev Environment Successfully Deployed!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**🌐 Live Application:** [$CLOUDFRONT_URL]($CLOUDFRONT_URL)" >> $GITHUB_STEP_SUMMARY
          echo "**🔗 Backend API:** [$BACKEND_API_URL]($BACKEND_API_URL)" >> $GITHUB_STEP_SUMMARY
          echo "**🏷️ Environment:** dev (hardcoded for automatic deployment)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Deployment Details" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status | Details |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | ✅ Dev | Hardcoded for auto-deployment |" >> $GITHUB_STEP_SUMMARY
          echo "| **Backend Infrastructure** | ✅ Deployed | Stack: \`${{ needs.prepare-deployment.outputs.backend_stack_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Frontend Infrastructure** | ✅ Deployed | Stack: \`${{ needs.prepare-deployment.outputs.frontend_stack_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **React Build** | ✅ Complete | Production optimized build |" >> $GITHUB_STEP_SUMMARY
          echo "| **S3 Upload** | ✅ Complete | Bucket: \`$BUCKET_NAME\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **CloudFront** | ✅ Invalidated | Distribution: \`$DISTRIBUTION_ID\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ⚡ Performance Optimizations" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 🎯 **Cache Strategy**: HTML files (no-cache), Assets (1-year cache)" >> $GITHUB_STEP_SUMMARY
          echo "- 🌍 **Global CDN**: CloudFront distribution for worldwide access" >> $GITHUB_STEP_SUMMARY
          echo "- 🔒 **Security**: HTTPS redirect and secure headers enabled" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Quick Links" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend Application**: [$CLOUDFRONT_URL]($CLOUDFRONT_URL)" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend API**: [$BACKEND_API_URL]($BACKEND_API_URL)" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend Stack**: [CloudFormation Console](https://console.aws.amazon.com/cloudformation/home?region=${{ env.AWS_REGION }}#/stacks/stackinfo?stackId=${{ needs.prepare-deployment.outputs.backend_stack_name }})" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend Stack**: [CloudFormation Console](https://console.aws.amazon.com/cloudformation/home?region=${{ env.AWS_REGION }}#/stacks/stackinfo?stackId=${{ needs.prepare-deployment.outputs.frontend_stack_name }})" >> $GITHUB_STEP_SUMMARY
          echo "- **S3 Bucket**: [S3 Console](https://s3.console.aws.amazon.com/s3/buckets/$BUCKET_NAME)" >> $GITHUB_STEP_SUMMARY
          echo "- **CloudFront**: [CloudFront Console](https://console.aws.amazon.com/cloudfront/v3/home#/distributions/$DISTRIBUTION_ID)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔄 Automatic Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This dev environment automatically deploys when changes are merged to the main branch." >> $GITHUB_STEP_SUMMARY
          echo "The environment name is hardcoded as 'dev' for consistency and predictability." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY