openapi: 3.0.0
info:
  version: 1.0.0
  title: AgentCore Chatbot Backend API
  description: Backend API for an AI assistant powered by Bedrock AgentCore

servers:
  - url: https://example.com/api
    description: Example URL

x-amazon-apigateway-request-validators:
  Validate body, query string parameters, and headers:
    validateRequestParameters: true
    validateRequestBody: true

securityDefinitions:
  CognitoAuthorizer:
    type: apiKey
    name: Authorization
    in: header
    x-amazon-apigateway-authtype: cognito_user_pools
    x-amazon-apigateway-authorizer:
      type: cognito_user_pools
      providerARNs:
        - Fn::GetAtt: [CognitoUserPool, Arn]

x-amazon-apigateway-gateway-responses:
  BAD_REQUEST_BODY:
    statusCode: 400
    responseTemplates:
      application/json: '{ "message": "$context.error.validationErrorString" }'
    responseParameters:
      gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
      gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token,X-User-Id'"
      gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,OPTIONS'"
  DEFAULT_4XX:
    responseParameters:
      gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
      gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token,X-User-Id'"
      gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,OPTIONS'"
  DEFAULT_5XX:
    responseParameters:
      gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
      gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token,X-User-Id'"
      gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,OPTIONS'"

paths:
  /websocket/connect:
    post:
      summary: Generate presigned WebSocket URL
      operationId: postWebSocketConnect
      description: Generates an AWS SigV4 presigned WebSocket URL for authenticated browser clients
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sessionId:
                  type: string
                  description: Optional session ID (generated if not provided)
      responses:
        '200':
          description: Presigned WebSocket URL generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebSocketConnectResponse'
        '401':
          description: Unauthorized - Invalid or missing authentication token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WebSocketConnectFunction.Arn}/invocations



components:
  schemas:
    WebSocketConnectResponse:
      type: object
      properties:
        wsUrl:
          type: string
          description: Presigned WebSocket URL with AWS SigV4 authentication
          example: "wss://bedrock-agentcore.us-east-1.amazonaws.com/runtimes/agent-xyz123/ws?X-Amz-Algorithm=..."
        sessionId:
          type: string
          description: Session ID for this WebSocket connection
        userId:
          type: string
          description: Authenticated user's ID from Cognito
        expiresIn:
          type: integer
          description: URL expiration time in seconds
          example: 300
        message:
          type: string
          description: Additional information about the connection

    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
          description: Error type
          enum:
            - "INVALID_REQUEST"
            - "INTERNAL_SERVER_ERROR"
        message:
          type: string
          description: Human-readable error description
