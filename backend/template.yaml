AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AgentCore Chatbot Backend - Serverless infrastructure for an AI assistant powered by Bedrock AgentCore

Parameters:
  ArtifactsBucketName:
    Type: String
    Description: S3 bucket name for deployment artifacts (used for direct code deployment)

  AgentDirectDeployKey:
    Type: String
    Description: S3 key for agent deployment ZIP file
    Default: "agents/agent.zip"

  EnvironmentHash:
    Type: String
    Description: A hash of the current environment

Globals:
  Function:
    Timeout: 30
    Runtime: nodejs24.x
    Architectures:
      - arm64
    Tracing: Active
  Api:
    Cors:
      AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
      AllowHeaders: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token,X-User-Id'"
      AllowOrigin: "'*'"
    TracingEnabled: true

Resources:
  BackendApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: api
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token,X-User-Id'"
        AllowOrigin: "'*'"
      DefinitionBody:
        Fn::Transform:
          Name: AWS::Include
          Parameters:
            Location: ./openapi.yaml

  WebSocketConnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/
      Handler: websocket-connect.handler
      Description: Generates AWS SigV4 presigned WebSocket URL for authenticated browser clients
      Runtime: nodejs24.x
      Timeout: 30
      Environment:
        Variables:
          AGENT_RUNTIME_ARN: !Sub "arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:runtime/${AgentCoreRuntime}"
      Events:
        PostWebSocketConnect:
          Type: Api
          Properties:
            RestApiId: !Ref BackendApi
            Path: /websocket/connect
            Method: POST
            Auth:
              Authorizer: CognitoAuthorizer
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - bedrock-agentcore:InvokeAgentRuntime
                - bedrock-agentcore:InvokeAgentRuntimeWithWebSocketStream
              Resource: !Sub "arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:runtime/*"
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*"
            - Effect: Allow
              Action:
                - xray:PutTraceSegments
                - xray:PutTelemetryRecords
                - xray:GetSamplingRules
                - xray:GetSamplingTargets
              Resource: "*"
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2020
        EntryPoints:
          - websocket-connect.js
        External:
          - '@aws-sdk/*'

  AgentCoreShortTermMemory:
    Type: AWS::BedrockAgentCore::Memory
    Properties:
      Name: !Sub WearCast${EnvironmentHash}
      Description: Short-term memory for agent conversation persistence
      MemoryExecutionRoleArn: !GetAtt AgentCoreRole.Arn
      EventExpiryDuration: 30

  AgentCoreRuntime:
    Type: AWS::BedrockAgentCore::Runtime
    Properties:
      AgentRuntimeArtifact:
        CodeConfiguration:
          Code:
            S3:
              Bucket: !Ref ArtifactsBucketName
              Prefix: !Ref AgentDirectDeployKey
          EntryPoint:
            - agent.py
          Runtime: PYTHON_3_13
      AgentRuntimeName: !Sub WearCast${EnvironmentHash}
      NetworkConfiguration:
        NetworkMode: PUBLIC
      RoleArn: !GetAtt AgentCoreRole.Arn
      EnvironmentVariables:
        AGENTCORE_MEMORY_ID: !GetAtt AgentCoreShortTermMemory.MemoryId

  AgentCoreRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AssumeRolePolicy
            Effect: Allow
            Principal:
              Service: bedrock-agentcore.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                "aws:SourceAccount": !Ref AWS::AccountId
      Policies:
        - PolicyName: AgentCorePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: S3DirectDeployAccess
                Effect: Allow
                Action:
                  - s3:GetObject
                Resource:
                  - !Sub "arn:aws:s3:::${ArtifactsBucketName}/*"
              - Effect: Allow
                Action:
                  - logs:DescribeLogStreams
                  - logs:CreateLogGroup
                Resource:
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/bedrock-agentcore/runtimes/*"
              - Effect: Allow
                Action:
                  - logs:DescribeLogGroups
                Resource:
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:*"
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/bedrock-agentcore/runtimes/*:log-stream:*"
              - Effect: Allow
                Action:
                  - xray:PutTraceSegments
                  - xray:PutTelemetryRecords
                  - xray:GetSamplingRules
                  - xray:GetSamplingTargets
                Resource: "*"
              - Effect: Allow
                Resource: "*"
                Action: cloudwatch:PutMetricData
                Condition:
                  StringEquals:
                    "cloudwatch:namespace": bedrock-agentcore
              - Sid: BedrockAgentCoreRuntime
                Effect: Allow
                Action:
                  - bedrock-agentcore:InvokeAgentRuntime
                Resource:
                  - !Sub "arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:runtime/*"
              - Sid: BedrockAgentCoreMemoryCreateMemory
                Effect: Allow
                Action:
                  - bedrock-agentcore:CreateMemory
                Resource: "*"
              - Sid: BedrockAgentCoreMemory
                Effect: Allow
                Action:
                  - bedrock-agentcore:CreateEvent
                  - bedrock-agentcore:GetEvent
                  - bedrock-agentcore:GetMemory
                  - bedrock-agentcore:GetMemoryRecord
                  - bedrock-agentcore:ListActors
                  - bedrock-agentcore:ListEvents
                  - bedrock-agentcore:ListMemoryRecords
                  - bedrock-agentcore:ListSessions
                  - bedrock-agentcore:DeleteEvent
                  - bedrock-agentcore:DeleteMemoryRecord
                  - bedrock-agentcore:RetrieveMemoryRecords
                Resource:
                  - !Sub "arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:memory/*"
              - Sid: BedrockAgentCoreIdentityGetResourceApiKey
                Effect: Allow
                Action:
                  - bedrock-agentcore:GetResourceApiKey
                Resource:
                  - !Sub "arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:token-vault/default"
                  - !Sub "arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:token-vault/default/apikeycredentialprovider/*"
                  - !Sub "arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:workload-identity-directory/default"
                  - !Sub "arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:workload-identity-directory/default/workload-identity/agent-*"
              - Sid: BedrockAgentCoreIdentityGetResourceOauth2Token
                Effect: Allow
                Action:
                  - bedrock-agentcore:GetResourceOauth2Token
                Resource:
                  - !Sub "arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:token-vault/default"
                  - !Sub "arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:token-vault/default/oauth2credentialprovider/*"
                  - !Sub "arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:workload-identity-directory/default"
                  - !Sub "arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:workload-identity-directory/default/workload-identity/agent-*"
              - Sid: BedrockAgentCoreIdentityGetWorkloadAccessToken
                Effect: Allow
                Action:
                  - bedrock-agentcore:GetWorkloadAccessToken
                  - bedrock-agentcore:GetWorkloadAccessTokenForJWT
                  - bedrock-agentcore:GetWorkloadAccessTokenForUserId
                Resource:
                  - !Sub "arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:workload-identity-directory/default"
                  - !Sub "arn:aws:bedrock-agentcore:${AWS::Region}:${AWS::AccountId}:workload-identity-directory/default/workload-identity/agent-*"
              - Sid: BedrockModelInvocation
                Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                  - bedrock:ApplyGuardrail
                Resource:
                  - "arn:aws:bedrock:*::foundation-model/*"
                  - !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:*"

  # Cognito User Pool for user authentication
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub AgentChatUsers${EnvironmentHash}
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: false
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      UserAttributeUpdateSettings:
        AttributesRequireVerificationBeforeUpdate:
          - email

  # User Pool Client for frontend application
  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref CognitoUserPool
      ClientName: !Sub ChatFrontend${EnvironmentHash}
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH
      AccessTokenValidity: 60
      IdTokenValidity: 60
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: minutes
        IdToken: minutes
        RefreshToken: days
      PreventUserExistenceErrors: ENABLED
      ReadAttributes:
        - email
        - email_verified
      WriteAttributes:
        - email

Outputs:
  BackendApiUrl:
    Description: "API Gateway endpoint URL for Backend API"
    Value: !Sub "https://${BackendApi}.execute-api.${AWS::Region}.amazonaws.com/api/"

  AgentCoreRuntimeId:
    Description: "AgentCore Runtime ID for the Agent"
    Value: !Ref AgentCoreRuntime

  AgentCoreMemoryId:
    Description: "AgentCore Short-Term Memory ID"
    Value: !GetAtt AgentCoreShortTermMemory.MemoryId

  UserPoolId:
    Description: "Cognito User Pool ID for user authentication"
    Value: !Ref CognitoUserPool
    Export:
      Name: !Sub "${AWS::StackName}-UserPoolId"

  UserPoolClientId:
    Description: "Cognito User Pool Client ID for frontend application"
    Value: !Ref CognitoUserPoolClient
    Export:
      Name: !Sub "${AWS::StackName}-UserPoolClientId"

  UserPoolRegion:
    Description: "AWS Region where Cognito User Pool is deployed"
    Value: !Ref AWS::Region
    Export:
      Name: !Sub "${AWS::StackName}-UserPoolRegion"

  CognitoDiscoveryUrl:
    Description: "OIDC Discovery URL for JWT validation"
    Value: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPool}/.well-known/openid-configuration"
    Export:
      Name: !Sub "${AWS::StackName}-CognitoDiscoveryUrl"
